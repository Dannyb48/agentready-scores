name: Assess repos (scheduled)

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      org:
        description: 'GitHub org to assess (overrides repos.yaml)'
        required: false
      workers:
        description: 'Max concurrent workers'
        default: '5'
        required: false

jobs:
  assess:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout central repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runner/requirements.txt

      - name: Install dependencies
        run: pip install -r runner/requirements.txt

      - name: Configure git for pushing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run assessments (all public repos in org)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "${{ inputs.org }}" ]; then
            python3 runner/assess.py \
              --org "${{ inputs.org }}" \
              --workers "${{ inputs.workers || '5' }}" \
              --retries 1
          else
            # Default: discover all repos for each org defined in runner/orgs/
            python3 runner/assess.py \
              --from-file runner/orgs/*.yaml \
              --workers "${{ inputs.workers || '5' }}" \
              --retries 1
          fi

      - name: Upload failed repos artifact (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-repos
          path: runner/failed-repos.yaml
          if-no-files-found: ignore

      - name: Fail job if failures remain
        if: always()
        run: |
          if [ -f runner/failed-repos.txt ]; then
            echo "Some repos failed assessment:"
            cat runner/failed-repos.txt
            exit 1
          fi
